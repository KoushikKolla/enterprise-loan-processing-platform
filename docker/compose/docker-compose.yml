version: '3.9'

services:

  mysql:

    image: mysql:8.4

    container_name: elpp-mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enterprise_loan_db
      MYSQL_USER: elpp
      MYSQL_PASSWORD: elpp123

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: